"PostgreSQL Performance":
  slug: postgresql-performance-playbook
  title: "PostgreSQL Performance Playbook"
  icon: fas fa-database
  order: 3
  tagline: "Production stories on indexing, query plans, and tuning Rails apps on PostgreSQL — in the order I'd read them."
  seo_description: "PostgreSQL performance playbook: production case studies on indexing, EXPLAIN ANALYZE, query tuning, and Rails — curated path through Eugene Leontev's PostgreSQL series."
  featured:
    - slug: seven-postgresql-performance-mistakes-i-keep-seeing
      blurb: "Seven mistakes I keep seeing in production audits — pg_stat_statements, ORM N+1s, lock waits, FK indexes, and the mental model underneath."
    - slug: the-index-lie-why-just-add-an-index-can-make-your-query-slower
      blurb: "When the planner chooses a sequential scan on purpose — Heap Fetches, selectivity, and write-side cost."
    - slug: how-we-reduced-postgresql-query-time-from-250ms-to-20ms
      blurb: "Partial indexes, planner regressions, and the query rewrite nobody wanted — Rails production case study."
    - slug: stop-reading-explain-analyze-start-cross-examining-it
      blurb: "Four numbers, four myths, and a reading method for every slow query on your desk."
  foundational:
    slug: sql-optimization-or-criminal-tracking
    blurb: "Multi-part SQL optimization on a high-traffic Rails API (31K+ readers). PMDSC methodology, PgHero, New Relic, and the query that started it all."
    footnote: "*Updated 2026: this series continues with the posts above — same database, sharper tooling.*"
  problems:
    - label: "Everything feels slow, don't know where to start"
      slug: seven-postgresql-performance-mistakes-i-keep-seeing
      short_title: "7 Mistakes"
    - label: "Index added but query still slow / got slower"
      slug: the-index-lie-why-just-add-an-index-can-make-your-query-slower
      short_title: "Index Lie"
    - label: "Endpoint slow, Postgres time high in APM"
      slug: how-we-reduced-postgresql-query-time-from-250ms-to-20ms
      short_title: "250ms → 20ms"
    - label: "Don't trust EXPLAIN output"
      slug: stop-reading-explain-analyze-start-cross-examining-it
      short_title: "Cross-Examining EXPLAIN"
    - label: "RDS CPU credits draining"
      slug: sql-optimization-or-criminal-tracking
      short_title: "SQL Criminal Tracking"
    - label: "Billing / reconciliation queries slow"
      slug: billing-idempotency-webhooks-unique-indexes
      short_title: "Billing idempotency"
      note: "indexes on ledger tables"
  related:
    - slug: redis-is-single-threaded
      blurb: "Sidekiq, cache, and I/O threads"
    - slug: your-billing-system-probably-isnt-an-accounting-system
      blurb: "Ledger queries and reconciliation"
