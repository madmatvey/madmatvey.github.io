      url: https://explain.depesz.com
      blurb: "visual EXPLAIN plans"
    - name: New Relic
      url: https://newrelic.com
      blurb: "Postgres time vs app time"
    - name: "PostgreSQL EXPLAIN (ANALYZE, BUFFERS)"
      url: https://www.postgresql.org/docs/current/sql-explain.html
      blurb: ""

