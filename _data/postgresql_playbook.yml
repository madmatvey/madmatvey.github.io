# PostgreSQL Performance Playbook — curated reading path.
# Links appear on the hub page only after the post's publish date (Jekyll skips future posts).
# When publishing a new series post:
#   1. Add slug to postgresql-performance in _data/content_clusters.yml (for "More in this series")
#   2. Add slug below in the relevant section(s)

start_here:
  - slug: the-index-lie-why-just-add-an-index-can-make-your-query-slower
    blurb: "When the planner chooses a sequential scan on purpose — Heap Fetches, selectivity, and write-side cost."
  - slug: how-we-reduced-postgresql-query-time-from-250ms-to-20ms
    blurb: "Partial indexes, planner regressions, and the query rewrite nobody wanted — Rails production case study."
  - slug: stop-reading-explain-analyze-start-cross-examining-it
    blurb: "Four numbers, four myths, and a reading method for every slow query on your desk."

foundational:
  slug: sql-optimization-or-criminal-tracking
  blurb: "multi-part SQL optimization on a high-traffic Rails API (31K+ readers). PMDSC methodology, PgHero, New Relic, and the query that started it all."
  footnote: "*Updated 2026: this series continues with the posts above — same database, sharper tooling.*"

